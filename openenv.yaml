spec_version: 1
name: support_triage
type: space
runtime: fastapi
app: server.app:app
port: 8000
metadata:
  title: Customer Support Triage OpenEnv
  description: Deterministic customer support triage benchmark with routing and FAQ reply tasks.
  tags:
    - openenv
    - customer-support
    - triage
tasks:
  - id: easy
    reset_kwargs:
      task: easy
    graders:
      - trajectory
    score_range: [0.0, 1.0]
  - id: medium
    reset_kwargs:
      task: medium
    graders:
      - trajectory
    score_range: [0.0, 1.0]
  - id: hard
    reset_kwargs:
      task: hard
    graders:
      - trajectory
    score_range: [0.0, 1.0]
