spec_version: 1
name: support_triage
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - id: easy
    score_range: [0.01, 0.99]
    reset_kwargs:
      task: easy
    grader: trajectory
    graders: [trajectory]
  - id: medium
    score_range: [0.01, 0.99]
    reset_kwargs:
      task: medium
    grader: trajectory
    graders: [trajectory]
  - id: hard
    score_range: [0.01, 0.99]
    reset_kwargs:
      task: hard
    grader: trajectory
    graders: [trajectory]
